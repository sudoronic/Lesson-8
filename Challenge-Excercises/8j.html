<!DOCTYPE html>
<html lang="en">
<head>
  <title>Coin Flip</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
      color: white;
      background-color: #4CAF50;
    }

    h2 {
      color: #333;
    }

    p {
      color: #080505;
    }
  </style>
</head>
<body>
  <h2>Coin Flip</h2>
  
  <p>Click a button to guess the outcome:</p>

  <button onclick="playGame('Heads')">Heads</button>

  <button onclick="playGame('Tails')">Tails</button>

  <button onclick="resetScore()">Reset Score</button>

  <p id="score">Wins: 0 | Losses: 0</p>

  <script>
    let score = JSON.parse(localStorage.getItem('store')) || {
      Win: 0,
      Lose: 0
    };

    function updateScore() {
      document.getElementById('score').textContent =
        `Wins: ${score.Win} | Losses: ${score.Lose}`;
    }

    function resetScore() {
      score.Win = 0;
      score.Lose = 0;
      localStorage.setItem('store', JSON.stringify(score));
      updateScore();
    }

    function playGame(playerMove) {
      const randomNumber = Math.random();
      const result = randomNumber < 0.5 ? 'Heads' : 'Tails';

      if (playerMove === result) {
        score.Win += 1;
        alert(`You Win! Wins: ${score.Win} | Losses: ${score.Lose}`);
      } else {
        score.Lose += 1;
        alert(`You Lose! Wins: ${score.Win} | Losses: ${score.Lose}`);
      }

      localStorage.setItem('store', JSON.stringify(score));
      updateScore();
    }

    updateScore();
  </script>
</body>
</html>
