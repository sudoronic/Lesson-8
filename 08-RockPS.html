<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>

    <p>Rock Paper Scissors</p>

    <button onclick="playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick="playGame('scissors');">Scissors</button>

    <button onclick="score.Wins = 0;
    score.Ties = 0;
    score.Loses = 0;">Reset Score</button>

    <script> 
    //made the object 'score'
    let score = {
      Wins:0,
      Loses:0,
      Ties:0
    }  
      function playGame(playerMove) {
        const compMove = pickCompMove();

        let result = '';
      if(playerMove === 'scissors')
      {
        if (compMove === 'rock') {
          result = 'Lose';
        } else if (compMove === 'paper') {
          result = 'Win';
        } else if (compMove === 'scissors') {
          result = 'Tie';
        }
      }else if(playerMove === 'paper')
      {
        if (compMove === 'rock') 
        {
            result = 'Win';
          } else if (compMove === 'paper') {
            result = 'Tie';
          } else if (compMove === 'scissors') {
            result = 'Lose';
          }
      }else if (playerMove === 'rock')
      {
        if (compMove === 'rock') {
          result = 'Tie';
        } else if (compMove === 'paper') {
          result = 'Lose';
        } else if (compMove === 'scissors') {
          result = 'Win';
        }
      }

      if (result === 'Win'){
        score.Wins += 1;
      }else if (result === 'Lose'){
        score.Loses += 1;
      }else if (result === 'Tie'){
        score.Ties += 1;
      }
        alert(`You picked ${playerMove}. Computer picked ${compMove}. So ${result} 
        Scores :[ wins : ${score.Wins} , Loses : ${score.Loses} , Ties : ${score.Ties} ]`);

      }
      
      function pickCompMove() {

          let compMove = '';
          const randomNumber = Math.random();
          if(randomNumber >0 && randomNumber < 1/3) {
            compMove = 'rock';
          }else if(randomNumber > 1/3 && randomNumber < 2/3) {
            compMove = 'paper';
          }else if(randomNumber > 2/3 && randomNumber < 1) {
            compMove = 'scissors'
          } 
          
        return compMove;
      }
    </script>
  </body>
</html>
